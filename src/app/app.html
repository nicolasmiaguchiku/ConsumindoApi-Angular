<div class="container">
  <form></form>
  <table>
    <thead>
      <th>Id</th>
      <th>Nome</th>
      <th>Preço</th>
      <th>Categoria</th>
      <th>Estoque</th>
    </thead>


    <tbody>
      @for (product of products; track product) {
      <tr>
        <td>{{product.id}}</td>
        <td>{{product.nome}}</td>
        <td>{{product.preco}}</td>
        <td>{{product.categoria}}</td>
        <td>{{product.estoque}}</td>
      </tr>
      }
    </tbody>

  </table>
</div>
